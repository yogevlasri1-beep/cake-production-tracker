  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="format-detection" content="telephone=no">
  <title>מעקב יצור</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <script>window.__APP_BUILD__ = '169';</script>
  <script>
    (function earlyVersionGate() {
      if (/force-update=1/.test(location.search)) return;
      var build = Number(window.__APP_BUILD__ || 0);
      fetch('./js/version.js?gate=' + Date.now(), { cache: 'no-store', credentials: 'same-origin' })
        .then(function (res) { return res.ok ? res.text() : ''; })
        .then(function (text) {
          var match = text.match(/APP_VERSION\s*=\s*['"](\d+)['"]/);
          var remote = match ? Number(match[1]) : 0;
          if (!remote || remote <= build) return;
          var tasks = [];
          if (window.caches) {
            tasks.push(caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }));
          }
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }));
          }
          Promise.all(tasks).finally(function () {
            location.replace(location.pathname + '?force-update=1&t=' + Date.now());
          });
        })
        .catch(function () { /* ignore */ });
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css?v=169">
  <script type="importmap">
  {
    "imports": {
      "@capacitor/core": "https://cdn.jsdelivr.net/npm/@capacitor/core@7.2.0/dist/index.js"
    }
  }
  </script>
  <style>
    html, body { background: #f0f4f8 !important; margin: 0; height: 100%; overflow: hidden; color: #0f172a; }
    #app { height: 100dvh; max-height: 100dvh; overflow: hidden; background: #f0f4f8; }
    #boot-msg { text-align: center; padding: 48px 20px; color: #64748b; font-family: -apple-system, sans-serif; font-size: 1rem; }
  </style>
</head>
<body>
  <noscript><p style="padding:20px;font-family:sans-serif">יש להפעיל JavaScript</p></noscript>
  <div id="app">
    <header class="app-header">
      <div class="app-header-row">
        <button type="button" id="workspace-menu-btn" class="header-menu-btn" aria-label="תפריט עמדות" aria-expanded="false">☰</button>
        <div class="app-header-titles">
          <h1 id="page-title">בית</h1>
          <p id="page-subtitle" class="subtitle"></p>
          <span id="app-version" class="app-version"></span>
        </div>
      </div>
      <div id="workspace-drawer" class="workspace-drawer hidden" aria-hidden="true">
        <div class="workspace-drawer-panel">
          <div class="workspace-drawer-title">עמדות</div>
          <button type="button" class="workspace-menu-item active" data-workspace="production">
            <span class="workspace-menu-icon">🏭</span>
            <span class="workspace-menu-label">תיעוד יצור</span>
          </button>
          <button type="button" class="workspace-menu-item" data-workspace="suppliers">
            <span class="workspace-menu-icon">🚚</span>
            <span class="workspace-menu-label">ספקים</span>
          </button>
          <button type="button" class="workspace-menu-item" data-workspace="recipes">
            <span class="workspace-menu-icon">📒</span>
            <span class="workspace-menu-label">מתכונים</span>
          </button>
          <div class="workspace-drawer-divider" role="separator"></div>
          <div class="workspace-drawer-title">גיבוי</div>
          <button type="button" class="workspace-menu-item" id="workspace-menu-backup">
            <span class="workspace-menu-icon">💾</span>
            <span class="workspace-menu-label">
              גיבוי ושחזור
              <small class="workspace-menu-hint">כל האפליקציה — מתכונים, ספקים, ייצור</small>
            </span>
          </button>
        </div>
      </div>
    </header>

    <main id="main-content">
      <p id="boot-msg">טוען אפליקציה...</p>
    </main>

    <nav class="bottom-nav" aria-label="ניווט ראשי">
      <button class="nav-btn active" data-screen="home" aria-label="בית">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">בית</span>
      </button>
      <button class="nav-btn" data-screen="process" aria-label="תזרים יצור">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">תזרים</span>
      </button>
      <button class="nav-btn" data-screen="products" aria-label="מוצרים">
        <span class="nav-icon">📦</span>
        <span class="nav-label">מוצרים</span>
      </button>
      <button class="nav-btn" data-screen="manager" aria-label="ניהול מנהל">
        <span class="nav-icon">👔</span>
        <span class="nav-label">מנהל</span>
      </button>
      <button class="nav-btn" data-screen="reports" aria-label="דוחות">
        <span class="nav-icon">📊</span>
        <span class="nav-label">דוחות</span>
      </button>
    </nav>

    <nav id="recipes-sub-nav" class="recipes-sub-nav hidden" aria-label="ניווט מתכונים">
      <button type="button" class="recipes-nav-btn active" data-recipe-tab="browse" aria-label="מתכונים — צפייה">
        <span class="recipes-nav-icon">📋</span>
        <span class="recipes-nav-label">מתכונים</span>
      </button>
      <button type="button" class="recipes-nav-btn" data-recipe-tab="edit" aria-label="עריכה ובניית מתכונים">
        <span class="recipes-nav-icon">✏️</span>
        <span class="recipes-nav-label">עריכה ובנייה</span>
      </button>
      <button type="button" class="recipes-nav-btn" data-recipe-tab="baking" aria-label="אפיות">
        <span class="recipes-nav-icon">🔥</span>
        <span class="recipes-nav-label">אפיות</span>
      </button>
      <button type="button" class="recipes-nav-btn" data-recipe-tab="ratio" aria-label="מחשבון יחס">
        <span class="recipes-nav-icon">⚖️</span>
        <span class="recipes-nav-label">מחשבון יחס</span>
      </button>
    </nav>

    <nav id="suppliers-sub-nav" class="suppliers-sub-nav hidden" aria-label="ניווט ספקים">
      <button type="button" class="suppliers-nav-btn active" data-supplier-tab="browse" aria-label="ספקים">
        <span class="suppliers-nav-icon">🚚</span>
        <span class="suppliers-nav-label">ספקים</span>
      </button>
      <button type="button" class="suppliers-nav-btn" data-supplier-tab="edit" aria-label="עריכת ספקים">
        <span class="suppliers-nav-icon">✏️</span>
        <span class="suppliers-nav-label">עריכה</span>
      </button>
      <button type="button" class="suppliers-nav-btn" data-supplier-tab="order" aria-label="בניית הזמנה">
        <span class="suppliers-nav-icon">🛒</span>
        <span class="suppliers-nav-label">הזמנה</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" aria-label="סגור">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <script>
    function isIOSStandalone() {
      return (/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1))
        && (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
    }

    function showBootError(msg) {
      var main = document.getElementById('main-content');
      if (!main) return;
      var iosHint = isIOSStandalone()
        ? '<p style="font-size:0.85rem;color:#64748b;margin:12px 0;line-height:1.6"><strong>באייפון מהאייקון?</strong> לחץ «נקה מטמון ועדכן» — או סגור את האפליקציה, פתח <strong>Safari</strong> וגש לכתובת עם <code>?force-update=1</code></p>'
        : '';
      main.innerHTML =
        '<div class="card" style="margin:16px;border:2px solid #ef4444">' +
        '<div class="card-title" style="color:#dc2626">לא נטען</div>' +
        '<p style="font-size:0.9rem;line-height:1.6;margin:12px 0;word-break:break-word">' + msg + '</p>' +
        iosHint +
        '<button type="button" id="boot-retry" class="btn btn-primary" style="width:100%;margin-bottom:8px">נסה שוב</button>' +
        '<button type="button" id="boot-force-update" class="btn btn-secondary" style="width:100%">נקה מטמון ועדכן</button></div>';
      document.getElementById('boot-retry')?.addEventListener('click', function () { location.reload(); });
      document.getElementById('boot-force-update')?.addEventListener('click', function () {
        clearAllCaches().then(function () {
          try { localStorage.removeItem('appBuild'); } catch (e) { /* ignore */ }
          location.replace(location.pathname + '?force-update=1');
        });
      });
    }

    function clearAllCaches() {
      var tasks = [];
      if ('serviceWorker' in navigator) {
        tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }));
      }
      if (window.caches) {
        tasks.push(caches.keys().then(function (keys) {
          return Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }));
      }
      return Promise.all(tasks);
    }

    (function bootGate() {
      var BUILD = window.__APP_BUILD__;
      var params = new URLSearchParams(location.search);

      function fetchLatestBuild() {
        return fetch('./index.html?bust=' + Date.now(), { cache: 'no-store' })
          .then(function (res) { return res.ok ? res.text() : ''; })
          .then(function (html) {
            var match = html.match(/__APP_BUILD__\s*=\s*['"](\d+)['"]/);
            return match ? match[1] : BUILD;
          })
          .catch(function () { return BUILD; });
      }

      if (params.get('force-update') === '1') {
        clearAllCaches().then(function () {
          return fetchLatestBuild();
        }).then(function (latest) {
          window.__APP_BUILD__ = latest;
          try { localStorage.setItem('appBuild', latest); } catch (e) { /* ignore */ }
          var u = new URL(location.href);
          u.searchParams.delete('force-update');
          u.searchParams.set('v', latest);
          u.searchParams.set('t', String(Date.now()));
          location.replace(u.toString());
        });
        return;
      }

      function loadApp() {
        import('./js/app.js?v=' + BUILD).catch(function (err) {
          var detail = (err && err.message) ? err.message : String(err || 'שגיאה');
          showBootError('שגיאה בטעינה: ' + detail + '<br><br>לחץ «נקה מטמון ועדכן»');
        });
      }

      function finishBoot() {
        var stored = null;
        try { stored = localStorage.getItem('appBuild'); } catch (e) { /* ignore */ }

        if (stored && Number(stored) < Number(BUILD)) {
          clearAllCaches().then(function () {
            try { localStorage.setItem('appBuild', BUILD); } catch (e) { /* ignore */ }
            loadApp();
          });
          return;
        }

        try { localStorage.setItem('appBuild', BUILD); } catch (e) { /* ignore */ }
        loadApp();
      }

      fetch('./js/version.js?gate=' + Date.now(), { cache: 'no-store' })
        .then(function (res) { return res.ok ? res.text() : ''; })
        .then(function (text) {
          var match = text.match(/APP_VERSION\s*=\s*['"](\d+)['"]/);
          var remote = match ? match[1] : null;
          if (remote && Number(remote) > Number(BUILD)) {
            clearAllCaches().then(function () {
              location.replace(location.pathname + '?force-update=1&t=' + Date.now());
            });
            return;
          }
          finishBoot();
        })
        .catch(function () { finishBoot(); });
    })();

    window.addEventListener('error', function (e) {
      if (document.getElementById('boot-msg')) {
        showBootError(e.message || 'שגיאה בטעינה');
      }
    });

    window.addEventListener('unhandledrejection', function (e) {
      if (!document.getElementById('boot-msg')) return;
      var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || 'שגיאה בטעינה');
      showBootError(msg);
    });
  </script>
  <script src="js/vendor/dexie.min.js?v=169"></script>
  <script src="js/vendor/xlsx.full.min.js?v=169"></script>
</body>
</html>
